<div *ngIf="!isLoggedIn else loggedInContent">
  <div class="login-container">
    <h1 class="login-title">Member Login</h1>
    <form nz-form nzLayout="vertical" [formGroup]="validateForm" (ngSubmit)="submitForm()">
      <nz-form-item>
        <nz-form-control>
          <input formControlName="username" nz-input placeholder="Username" />
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-control>
          <nz-input-password>
            <input formControlName="password" nz-input placeholder="Password" />
          </nz-input-password>
        </nz-form-control>
      </nz-form-item>
      <nz-form-item>
        <nz-form-control>
          <button nz-button nzType="primary" nzBlock>Login</button>
        </nz-form-control>
      </nz-form-item>
    </form>
  </div>
</div>

<ng-template #loggedInContent>
  <div class="logged-in-wrapper">
    <ng-container *ngIf="user$ | async as user">
      <p class="user-title">Welcome, {{ user.username }}!</p>
      <div class="logout-container">
        <ng-container *ngIf="profile$ | async as profile">
          <nz-descriptions nzBordered [nzColumn]="2">
            <nz-descriptions-item nzTitle="First Name">{{ profile.firstName }}</nz-descriptions-item>
            <nz-descriptions-item nzTitle="Last Name">{{ profile.lastName }}</nz-descriptions-item>
          </nz-descriptions>

          <nz-descriptions nzBordered [nzColumn]="1">
            <nz-descriptions-item nzTitle="Email">{{ user.email }}</nz-descriptions-item>
          </nz-descriptions>

          <nz-descriptions nzBordered [nzColumn]="1">
            <nz-descriptions-item nzTitle="Username">{{ user.username }}</nz-descriptions-item>
          </nz-descriptions>

          <nz-descriptions nzBordered [nzColumn]="1">
            <nz-descriptions-item nzTitle="User ID">{{ user.userId }}</nz-descriptions-item>
          </nz-descriptions>

          <nz-descriptions nzBordered [nzColumn]="1">
            <nz-descriptions-item nzTitle="Profile ID">{{ profile.profileId }}</nz-descriptions-item>
          </nz-descriptions>

          <nz-descriptions nzBordered [nzColumn]="1">
            <nz-descriptions-item nzTitle="Last Synced">--</nz-descriptions-item>
          </nz-descriptions>
        </ng-container>

        <div class="button-row">
          <button nz-button nzType="primary">Sync Data</button>
          <button nz-button nzType="primary">Change Password</button>
          <button nz-button nzType="primary" (click)="logout()">Log out</button>
        </div>
      </div>
    </ng-container>
  </div>
</ng-template>
