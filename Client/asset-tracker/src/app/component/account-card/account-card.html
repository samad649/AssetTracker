<h1>Accounts:</h1>
<ng-container *ngIf="accounts$ | async as accounts">
  <p *ngIf="accounts.length === 0">No accounts found</p>
  <h2 *ngFor="let account of accounts">
    {{ account.accountId }}
    {{ account.balance }}
    {{ account.type }}
    {{ account.institution }}
  </h2>
</ng-container>
